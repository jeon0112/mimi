name: 나라장터 공고 자동 수집

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 UTC 23:00 = 한국 오전 8시 (KST = UTC+9)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests python-dotenv openpyxl

      - name: 공고 수집 및 AI 필터링 실행
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python run_collection.py

      - name: 결과 파일 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: 추천공고-${{ github.run_id }}
          path: |
            output/recommended_bids_*.json
            output/recommended_bids_*.xlsx
          retention-days: 30
        if: always()
